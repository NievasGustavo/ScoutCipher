<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScoutCipher - Cifrados Scouts</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #E2D4B7;
      --brown: #6C464F;
      --green: #515B3A;
      --orange: #DE6E4B;
      --dark: #3A2A2E;
      --light: #FAF8F2;
      --radius: 12px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--cream);
      color: var(--dark);
      min-height: 100vh;
      line-height: 1.5;
    }

    .header {
      background: var(--green);
      color: var(--cream);
      padding: 16px 20px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 1px;
    }
    .header h1 span { font-size: 1.8rem; }
    .header p {
      font-size: 0.9rem;
      opacity: 0.85;
      margin-top: 2px;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    .card {
      background: var(--light);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px 20px;
      margin-bottom: 20px;
      border: 1px solid rgba(108,70,79,0.1);
    }

    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      font-weight: 600;
      font-size: 0.85rem;
      color: var(--brown);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    select, input, textarea {
      width: 100%;
      padding: 10px 12px;
      border: 2px solid #d5c8b0;
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
      background: #fff;
      color: var(--dark);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    select:focus, input:focus, textarea:focus {
      outline: none;
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(81,91,58,0.15);
    }
    textarea {
      resize: vertical;
      min-height: 80px;
    }

    .cipher-desc {
      font-size: 0.88rem;
      color: #5a4a4e;
      margin-bottom: 12px;
      line-height: 1.5;
      padding: 10px 14px;
      background: rgba(226,212,183,0.3);
      border-radius: 8px;
      border-left: 3px solid var(--orange);
    }

    .reference-container {
      margin-bottom: 16px;
      overflow-x: auto;
      padding: 0 0 12px 0;
    }

    .ref-table {
      border-collapse: collapse;
      font-size: 0.88rem;
      margin: 0 auto;
    }
    .ref-table td {
      padding: 4px 7px;
      text-align: center;
      border: 1px solid #d5c8b0;
      min-width: 26px;
    }
    .ref-char {
      font-weight: 700;
      color: var(--dark);
      background: rgba(226,212,183,0.25);
    }
    .ref-code {
      font-family: "Courier New", monospace;
      color: var(--brown);
      font-size: 0.85rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .ref-label {
      font-weight: 600;
      font-size: 0.7rem;
      color: var(--green);
      background: rgba(81,91,58,0.08);
      border: none !important;
      padding: 3px 6px !important;
    }
    .ref-hint {
      font-size: 0.82rem;
      color: #8a7a7e;
      font-style: italic;
    }
    .ref-simple {
      font-size: 0.85rem;
      color: var(--brown);
      background: rgba(226,212,183,0.2);
      padding: 10px 14px;
      border-radius: 8px;
    }

    .grid-pythagorean {
      border-collapse: collapse;
      margin: 0 auto;
    }
    .grid-pythagorean th {
      font-weight: 700;
      color: var(--brown);
      background: rgba(226,212,183,0.3);
      padding: 4px 8px;
      border: 1px solid #E8DEC6;
      text-align: center;
      min-width: 30px;
      font-size: 0.8rem;
    }
    .grid-pythagorean td {
      border: 1px solid #E8DEC6;
      padding: 6px 5px;
      text-align: center;
      min-width: 36px;
    }
    .grid-pythagorean .ref-char {
      display: block;
      font-size: 0.95rem;
      font-weight: 700;
    }
    .grid-pythagorean td.sep-v {
      border-right: 3px double var(--orange);
    }
    .grid-pythagorean th.sep-v {
      border-right: 3px double var(--orange);
    }
    .grid-pythagorean td.sep-h {
      border-bottom: 3px double var(--orange);
    }
    .ref-code-sm {
      display: block;
      font-size: 0.7rem;
      color: var(--brown);
      font-family: "Courier New", monospace;
      margin-top: 2px;
      font-weight: 700;
    }

    .btn-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .btn {
      flex: 1;
      min-width: 120px;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary {
      background: var(--green);
      color: #fff;
    }
    .btn-primary:hover { background: #3f4a2e; }
    .btn-secondary {
      background: var(--brown);
      color: #fff;
    }
    .btn-secondary:hover { background: #573a41; }
    .btn-outline {
      background: transparent;
      color: var(--brown);
      border: 2px solid var(--brown);
    }
    .btn-outline:hover { background: rgba(108,70,79,0.08); }
    .btn-sm {
      padding: 6px 14px;
      font-size: 0.82rem;
      flex: none;
      min-width: auto;
    }

    .result-container { display: none; }
    .result-container textarea {
      background: #f4efe6;
      font-family: "Courier New", monospace;
      font-size: 0.9rem;
      min-height: 50px;
      margin-bottom: 8px;
    }
    .result-actions {
      display: flex;
      justify-content: flex-end;
    }

    .error-msg {
      display: none;
      background: #fce8e8;
      color: #b33;
      border: 1px solid #ecc;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-bottom: 12px;
    }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .history-header h2 {
      font-size: 1rem;
      color: var(--brown);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .history-list {
      list-style: none;
    }
    .history-item {
      padding: 8px 12px;
      border-left: 3px solid var(--orange);
      background: rgba(226,212,183,0.15);
      margin-bottom: 6px;
      border-radius: 0 6px 6px 0;
      font-size: 0.82rem;
      line-height: 1.4;
    }
    .history-meta {
      display: block;
      font-size: 0.72rem;
      color: #8a7a7e;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .history-input, .history-output {
      font-family: "Courier New", monospace;
      word-break: break-all;
    }
    .history-arrow { color: var(--orange); margin: 0 4px; }
    .history-empty {
      font-size: 0.85rem;
      color: #8a7a7e;
      font-style: italic;
      padding: 8px 12px;
    }

    .keyword-group { display: none; }

    .cajon-section { display: none; padding-top: 8px; }
    .cajon-section label {
      display: block;
      font-weight: 600;
      font-size: 0.85rem;
      color: var(--brown);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .cajon-grid-wrap {
      overflow-x: auto;
      margin-bottom: 12px;
      -webkit-overflow-scrolling: touch;
    }
    .cajon-grid {
      display: flex;
      flex-direction: column;
      gap: 4px;
      align-items: center;
    }
    .cg-row {
      display: flex;
      align-items: center;
      gap: 2px;
    }
    .cg-sep {
      display: inline-block;
      width: 2px;
      height: 36px;
      margin: 0 5px;
      background: var(--orange);
      flex-shrink: 0;
    }
    .cajon-btn {
      width: 36px;
      height: 36px;
      padding: 1px;
      border: 1px solid #d5c8b0;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: background 0.15s;
    }
    .cajon-btn:active { background: #e8e0d0; }
    .cajon-btn img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    .cajon-btn .cb-label {
      position: absolute;
      bottom: 0;
      right: 1px;
      font-size: 0.5rem;
      font-weight: 700;
      color: var(--brown);
      background: rgba(255,255,255,0.85);
      line-height: 1;
      padding: 0 2px;
      border-radius: 2px;
    }

    .cajon-actions {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 16px;
    }
    .cajon-actions .btn { min-width: 100px; flex: none; }

    .cajon-output {
      background: #fff;
      border: 2px solid #d5c8b0;
      border-radius: 8px;
      padding: 16px 20px;
      min-height: 56px;
      margin-bottom: 12px;
      line-height: 2.2;
      word-break: break-all;
    }
    .cajon-img {
      height: 36px;
      width: auto;
      vertical-align: middle;
      margin: 2px 1px;
    }
    .cajon-space {
      display: inline-block;
      width: 20px;
    }
    .cajon-ref-img {
      width: 28px;
      height: auto;
      display: block;
      margin: 0 auto 2px;
    }

    .footer {
      text-align: center;
      color: #8a7a7e;
      font-size: 0.8rem;
      padding: 12px;
    }
    .footer a { color: var(--brown); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }

    @media (max-width: 500px) {
      .card { padding: 16px 14px; }
      .header h1 { font-size: 1.3rem; }
      .btn-group { flex-direction: column; }
      .btn { width: 100%; }
      .history-header { flex-direction: column; align-items: stretch; gap: 8px; }
      .history-header h2 { text-align: center; }
      .cajon-btn { width: 44px; height: 40px; }
      .cajon-btn img { display: none; }
      .cajon-btn .cb-label {
        position: static;
        font-size: 1rem;
        background: none;
      }
      .cg-sep { height: 40px; margin: 0 3px; }
      .cajon-img { height: 28px; }
      .cajon-output { padding: 12px 14px; }
    }
  </style>
</head>
<body>

  <header class="header">
    <h1><span>⚜</span> ScoutCipher</h1>
    <p>Cifrados scouts para educadores</p>
  </header>

  <div class="container">

    <div class="card">
      <div class="form-group">
        <label for="cipherSelect">Tipo de cifrado</label>
        <select id="cipherSelect">
          <option value="morse">Morse</option>
          <option value="murcielago">Murciélago</option>
          <option value="keyword">Keyword (Palabra Clave)</option>
          <option value="backward">Alfabeto Invertido</option>
          <option value="cenitpolar">Cenit Polar</option>
          <option value="grid">Cuadrícula (Grid)</option>
          <option value="reverse">Inverso (Reverse)</option>
          <option value="parelinofu">Parelinofú</option>
          <option value="cajon">Cajón (Rejilla)</option>
        </select>
      </div>

      <div id="cipherDescription" class="cipher-desc"></div>
      <div id="referenceContainer" class="reference-container"></div>

      <div class="form-group">
        <label for="inputText">Mensaje</label>
        <textarea id="inputText" placeholder="Escribí tu mensaje acá..."></textarea>
      </div>

      <div id="keywordGroup" class="form-group keyword-group">
        <label for="keywordInput">Palabra clave</label>
        <input type="text" id="keywordInput" placeholder="Ej: batman, scout, patria...">
      </div>

      <div class="btn-group">
        <button id="encryptBtn" class="btn btn-primary">🔒 Cifrar</button>
        <button id="decryptBtn" class="btn btn-secondary">🔓 Descifrar</button>
      </div>

      <div id="errorMsg" class="error-msg"></div>

      <div id="resultContainer" class="result-container">
        <label for="resultText" style="display:block;font-weight:600;font-size:0.85rem;color:var(--brown);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px;">Resultado</label>
        <textarea id="resultText" readonly></textarea>
        <div class="result-actions">
          <button id="copyBtn" class="btn btn-outline btn-sm">📋 Copiar</button>
        </div>
      </div>

      <div id="cajonSection" class="cajon-section" style="margin-top:16px">
        <label>Grilla interactiva</label>
        <div class="cajon-grid-wrap">
          <div class="cajon-grid">
            <div class="cg-row">
              <button id="btnA" class="cajon-btn" title="A"><img src="img/rejilla/A.svg"><span class="cb-label">A</span></button>
              <button id="btnB" class="cajon-btn" title="B"><img src="img/rejilla/B.svg"><span class="cb-label">B</span></button>
              <button id="btnC" class="cajon-btn" title="C"><img src="img/rejilla/C.svg"><span class="cb-label">C</span></button>
              <span class="cg-sep"></span>
              <button id="btnD" class="cajon-btn" title="D"><img src="img/rejilla/D.svg"><span class="cb-label">D</span></button>
              <button id="btnE" class="cajon-btn" title="E"><img src="img/rejilla/E.svg"><span class="cb-label">E</span></button>
              <button id="btnF" class="cajon-btn" title="F"><img src="img/rejilla/F.svg"><span class="cb-label">F</span></button>
              <span class="cg-sep"></span>
              <button id="btnG" class="cajon-btn" title="G"><img src="img/rejilla/G.svg"><span class="cb-label">G</span></button>
              <button id="btnH" class="cajon-btn" title="H"><img src="img/rejilla/H.svg"><span class="cb-label">H</span></button>
              <button id="btnI" class="cajon-btn" title="I"><img src="img/rejilla/I.svg"><span class="cb-label">I</span></button>
            </div>
            <div class="cg-row">
              <button id="btnJ" class="cajon-btn" title="J"><img src="img/rejilla/J.svg"><span class="cb-label">J</span></button>
              <button id="btnK" class="cajon-btn" title="K"><img src="img/rejilla/K.svg"><span class="cb-label">K</span></button>
              <button id="btnL" class="cajon-btn" title="L"><img src="img/rejilla/L.svg"><span class="cb-label">L</span></button>
              <span class="cg-sep"></span>
              <button id="btnM" class="cajon-btn" title="M"><img src="img/rejilla/M.svg"><span class="cb-label">M</span></button>
              <button id="btnN" class="cajon-btn" title="N"><img src="img/rejilla/N.svg"><span class="cb-label">N</span></button>
              <button id="btnÑ" class="cajon-btn" title="Ñ"><img src="img/rejilla/Ñ.svg"><span class="cb-label">Ñ</span></button>
              <span class="cg-sep"></span>
              <button id="btnO" class="cajon-btn" title="O"><img src="img/rejilla/O.svg"><span class="cb-label">O</span></button>
              <button id="btnP" class="cajon-btn" title="P"><img src="img/rejilla/P.svg"><span class="cb-label">P</span></button>
              <button id="btnQ" class="cajon-btn" title="Q"><img src="img/rejilla/Q.svg"><span class="cb-label">Q</span></button>
            </div>
            <div class="cg-row">
              <button id="btnR" class="cajon-btn" title="R"><img src="img/rejilla/R.svg"><span class="cb-label">R</span></button>
              <button id="btnS" class="cajon-btn" title="S"><img src="img/rejilla/S.svg"><span class="cb-label">S</span></button>
              <button id="btnT" class="cajon-btn" title="T"><img src="img/rejilla/T.svg"><span class="cb-label">T</span></button>
              <span class="cg-sep"></span>
              <button id="btnU" class="cajon-btn" title="U"><img src="img/rejilla/U.svg"><span class="cb-label">U</span></button>
              <button id="btnV" class="cajon-btn" title="V"><img src="img/rejilla/V.svg"><span class="cb-label">V</span></button>
              <button id="btnW" class="cajon-btn" title="W"><img src="img/rejilla/W.svg"><span class="cb-label">W</span></button>
              <span class="cg-sep"></span>
              <button id="btnX" class="cajon-btn" title="X"><img src="img/rejilla/X.svg"><span class="cb-label">X</span></button>
              <button id="btnY" class="cajon-btn" title="Y"><img src="img/rejilla/Y.svg"><span class="cb-label">Y</span></button>
              <button id="btnZ" class="cajon-btn" title="Z"><img src="img/rejilla/Z.svg"><span class="cb-label">Z</span></button>
            </div>
          </div>
        </div>
        <div class="cajon-actions">
          <button id="cajonClear" class="btn btn-outline btn-sm">Limpiar</button>
          <button id="cajonSpace" class="btn btn-outline btn-sm">Espacio</button>
        </div>

        <label>Resultado cifrado</label>
        <div id="cajonOutput" class="cajon-output"></div>
        <button id="cajonPngBtn" class="btn btn-primary">📷 Generar PNG</button>
      </div>
    </div>

    <div class="card">
      <div class="history-header">
        <h2>📜 Historial</h2>
        <button id="clearHistoryBtn" class="btn btn-outline btn-sm">Limpiar</button>
      </div>
      <ul id="historyList" class="history-list">
        <li class="history-empty">Todavía no hay conversiones.</li>
      </ul>
    </div>

    <div class="footer">
      <p><a href="https://github.com/NievasGustavo/ScoutCipher" target="_blank">ScoutCipher</a> · MIT License · Hecho con ⚜ por Gustavo Nievas</p>
    </div>

  </div>

  <script src="js/ciphers.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
